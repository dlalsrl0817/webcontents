<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>도형 서식 폼 만들기</title>
    </head>
    <body>
        <h3>도형 서식 폼 만들기</h3>
        <hr>
        <form>
            선종류
            <select name="선종류" size="3">
                <option value="1">선없음</option>
                <option value="2" selected>실선</option>
                <option value="3">점선</option>
            </select><br>
            선두께 <input type="number">
            선색 <input type="color" value="#00BFFF" onchange="document.body.style.color=this.value">
        </form>
    </body>
</html>
