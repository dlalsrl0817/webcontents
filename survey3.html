<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>설문지</title>
    </head>
    <body>
        <h2>설문지</h2>
        <p>
            소프트웨어 기술에 대한 의견을 듣습니다. 많은 참여 부탁드립니다.
        </p>

        <form>
            <hr>
            <p>
                <strong>학년</strong>
                <label>
                    <input type="radio" name="grade"> 1학년
                </label>
                <label>
                    <input type="radio" name="grade"> 2학년
                </label>
                <label>
                    <input type="radio" name="grade"> 3학년
                </label>
            </p>

            <p>
                <strong>성별</strong>
                <label>
                    <input type="radio" name="gender"> 남
                </label>
                <label>
                    <input type="radio" name="gender"> 여
                </label>
            </p>
            <p>
                <strong>관심 분야</strong>
                <select>
                    <option>모바일 소프트웨어</option>
                    <option>웹 개발</option>
                    <option>AI</option>
                </select>
            </p>

            <p>
                <strong>진로</strong>
                <label>
                    <input type="checkbox" checked> 개발
                </label>
                <label>
                    <input type="checkbox"> 기획
                </label>
                <label>
                    <input type="checkbox"> 영업
                </label>
                <label>
                    <input type="checkbox"> 창업
                </label>
            </p>

            <p>
                <strong>남기고 싶은 말</strong><br>
                <textarea placeholder="글을 남겨주세요"></textarea>
            </p>
            <hr>

            <p>
                Copyright 2026 by MYONGJI COLLEGE
            </p>

        </form>
    </body>
</html>
